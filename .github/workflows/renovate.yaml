---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate

# Self-hosted Renovate, modelled on the home-operations setup but scoped to this
# single repo. Runs daily in the morning; can be dispatched manually.
#
# Required repo secrets (GitHub App, same names as home-operations):
#   BOT_CLIENT_ID        - the GitHub App's client id
#   BOT_APP_PRIVATE_KEY  - the GitHub App's private key
# The App must be installed on this repo with Contents, Pull requests, Issues
# and Workflows read/write. (Alternatively, swap the token step for a PAT in a
# RENOVATE_TOKEN secret.)
on:
  schedule:
    - cron: "0 11 * * *" # ~07:00 America/New_York (morning), daily
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry run
        type: boolean
        default: false
      logLevel:
        description: Log level
        type: choice
        default: info
        options: [debug, info]

permissions: {}

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-workflows: write

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Renovate
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == true && 'full' || '' }}
          RENOVATE_PLATFORM: github
          RENOVATE_AUTODISCOVER: false
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          RENOVATE_REQUIRE_CONFIG: required
        with:
          token: ${{ steps.app-token.outputs.token }}
